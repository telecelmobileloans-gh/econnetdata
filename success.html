<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#001a4d">
    <title>EcoCash | Success · Zimbabwe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --eco-red: #d32f2f;
            --eco-blue-dark: #001a4d;
            --eco-blue: #0033a0;
            --white: #ffffff;
            --light-bg: #f5f7fa;
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            --border: #e0e0e0;
            --success: #00b050;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--eco-blue) 0%, var(--eco-blue-dark) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background: white;
            padding: 16px 5%;
            border-bottom: 3px solid var(--eco-blue);
            box-shadow: 0 2px 12px rgba(0, 51, 160, 0.12);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .logo .eco { color: var(--eco-blue); }
        .logo .cash { color: var(--eco-red); }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .success-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 51, 160, 0.25);
            text-align: center;
            border: 2px solid var(--eco-blue);
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(0, 176, 80, 0.15);
            border: 3px solid var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
            animation: scaleIn 0.6s ease-out;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-header h1 {
            font-size: 28px;
            font-weight: 900;
            color: var(--success);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .success-header p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .bundle-info {
            background: linear-gradient(135deg, var(--eco-blue), var(--eco-blue-dark));
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 28px;
            color: white;
        }

        .bundle-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .bundle-info-row:last-child {
            margin-bottom: 0;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 8px;
            font-weight: 800;
            font-size: 16px;
        }

        .btn-home {
            width: 100%;
            background: linear-gradient(135deg, var(--eco-blue), var(--eco-blue-dark));
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(0, 51, 160, 0.3);
            margin-bottom: 12px;
        }

        .btn-home:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0, 51, 160, 0.4);
        }

        .btn-receipt {
            width: 100%;
            background: transparent;
            color: var(--eco-blue);
            border: 2px solid var(--eco-blue);
            padding: 14px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-receipt:hover {
            background: var(--light-bg);
        }

        .success-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .success-footer a {
            color: var(--eco-blue);
            text-decoration: none;
            font-weight: 800;
        }

        .success-footer a:hover {
            text-decoration: underline;
        }

        .security-badge {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        @media (max-width: 600px) {
            main { padding: 20px 16px; }
            .success-container { padding: 28px 20px; }
            .success-header h1 { font-size: 22px; }
            .success-icon { width: 70px; height: 70px; font-size: 35px; }
        }
    </style>
</head>
<body>
    <header>
        <a class="logo" href="index.html"><span class="eco">Eco</span><span class="cash">Cash</span></a>
    </header>

    <main>
        <div class="success-container">
            <div class="success-icon">✓</div>

            <div class="success-header">
                <h1>All Set!</h1>
                <p>Your bundle has been activated. You can start using your data right away.</p>
            </div>

            <div id="bundleInfo" class="bundle-info" style="display: none;">
                <div class="bundle-info-row">
                    <span>Bundle:</span>
                    <span id="bundleData">—</span>
                </div>
                <div class="bundle-info-row">
                    <span>Amount Paid:</span>
                    <span id="bundlePrice">USD 0.00</span>
                </div>
            </div>

            <button class="btn-home" onclick="window.location.href='index.html'">← Back to Home</button>
            <button class="btn-receipt" onclick="downloadReceipt()">📄 Receipt</button>

            <div class="success-footer">
                Your transaction is complete. <a href="#">View details</a>
            </div>

            <div class="security-badge">
                <div class="badge">🔒 Encrypted</div>
                <div class="badge">✓ Secure</div>
            </div>
        </div>
    </main>

    <script>
        function loadBundleData() {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            const price = params.get('price');

            if (data && price) {
                document.getElementById('bundleInfo').style.display = 'block';
                document.getElementById('bundleData').textContent = data;
                document.getElementById('bundlePrice').textContent = 'USD ' + price;
            }
        }

        function downloadReceipt() {
            alert('Receipt has been sent to your email.');
        }

        window.addEventListener('load', loadBundleData);
    </script>
</body>
</html>
